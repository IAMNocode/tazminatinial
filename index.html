const DB = {
  async loadAll() {
    if (!sb) return null;
    const [c, n, r, u] = await Promise.all([
      sb.from('clients').select('*').order('created_at', {ascending: false}),
      sb.from('notes').select('*').order('created_at', {ascending: false}),
      sb.from('reminders').select('*').order('date', {ascending: true}),
      sb.from('users').select('*'),
    ]);
    if (c.error || n.error || r.error || u.error) return null;
    return { clients: c.data, notes: n.data, reminders: r.data, users: u.data };
  },
  sync(table, prev, next) {
    if (!sb) return;
    // upsert added/changed
    next.forEach(item => {
      const old = prev.find(p => p.id === item.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(item)) {
        sb.from(table).upsert(item).then(() => {});
      }
    });
    // delete removed
    prev.forEach(item => {
      if (!next.find(n => n.id === item.id)) {
        sb.from(table).delete().eq('id', item.id).then(() => {});
      }
    });
  }
};

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('tr-TR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric'
  });
}
function formatDateTime(d) {
  if (!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('tr-TR', {
    day: '2-digit',
    month: '2-digit',
    year: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}
function formatRelative(d) {
  if (!d) return '';
  const now = new Date();
  const dt = new Date(d);
  const diff = now - dt;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Az önce';
  if (mins < 60) return `${mins} dk önce`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs} saat önce`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days} gün önce`;
  return formatDate(d);
}
function isOverdue(d) {
  return new Date(d) < new Date();
}
function isToday(d) {
  const dt = new Date(d);
